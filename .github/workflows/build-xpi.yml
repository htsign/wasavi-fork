name: Build Firefox XPI

on:
  push:
    branches: [master]
    paths:
      - 'src/core/**'
    tags: ['v*']

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '20'

      - name: Install web-ext
        run: npm install -g web-ext

      - name: Determine version
        id: version
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            TAG=$(git describe --tags --abbrev=0 2>/dev/null | sed 's/^v//')
            VERSION="${TAG:-0.0.1}"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Prepare source directory
        run: |
          mkdir -p .build/firefox
          # src/core is the single shared source tree for both crx and xpi builds
          rsync -rptL --delete \
            --exclude '*.sw?' --exclude '*.bak' --exclude '*~' --exclude '*.sh' \
            --exclude 'banner*.xcf' --exclude 'banner*.png' \
            --exclude '.*' \
            --exclude 'consumer_keys.json' --exclude 'consumer_keys.json.template' \
            --exclude 'consumer_keys.bin' \
            --exclude 'wasavi_frame_noscript.html' \
            src/core/ .build/firefox/

      - name: Place consumer keys (optional)
        env:
          CONSUMER_KEYS_BIN: ${{ secrets.CONSUMER_KEYS_BIN }}
        run: |
          if [ -n "${CONSUMER_KEYS_BIN}" ]; then
            printf '%s' "${CONSUMER_KEYS_BIN}" | base64 -d > .build/firefox/consumer_keys.bin
            echo "consumer_keys.bin placed from secret"
          else
            echo "CONSUMER_KEYS_BIN secret not set; cloud storage will be unavailable"
          fi

      - name: Update manifest version and strip update_url
        run: |
          node - <<'EOF'
          const fs = require('fs');
          const path = '.build/firefox/manifest.json';
          const m = JSON.parse(fs.readFileSync(path, 'utf8'));
          m.version = process.env.VERSION || '0.0.1';
          delete m.update_url;
          if (m.browser_specific_settings && m.browser_specific_settings.gecko) {
            delete m.browser_specific_settings.gecko.update_url;
          }
          fs.writeFileSync(path, JSON.stringify(m, null, 2) + '\n');
          console.log('manifest version set to', m.version);
          EOF
        env:
          VERSION: ${{ steps.version.outputs.version }}

      - name: Build XPI (signed on tagged releases)
        env:
          # web-ext sign reads these automatically
          WEB_EXT_API_KEY: ${{ secrets.AMO_JWT_ISSUER }}
          WEB_EXT_API_SECRET: ${{ secrets.AMO_JWT_SECRET }}
          IS_TAG: ${{ startsWith(github.ref, 'refs/tags/v') }}
        run: |
          shopt -s nullglob
          # drop the committed artifact so the glob below only sees this build's
          # fresh output (web-ext build emits .zip, web-ext sign emits .xpi)
          rm -f dist/wasavi.xpi
          # AMO rejects re-signing an already-seen version, so only sign tagged
          # releases (each tag is a fresh version). master/PR builds stay unsigned.
          if [ "${IS_TAG}" = "true" ] && [ -n "${WEB_EXT_API_KEY}" ] && [ -n "${WEB_EXT_API_SECRET}" ]; then
            echo "tagged release with AMO credentials; signing via the unlisted channel"
            # sign validates on AMO (a few minutes) and downloads the signed xpi
            web-ext sign \
              --source-dir .build/firefox \
              --artifacts-dir dist \
              --channel unlisted
          else
            if [ "${IS_TAG}" = "true" ]; then
              echo "::warning::tagged release but AMO credentials are absent; building an unsigned XPI"
            fi
            web-ext build \
              --source-dir .build/firefox \
              --artifacts-dir dist \
              --overwrite-dest
          fi
          # web-ext names the file after the extension name and version; rename to wasavi.xpi
          files=(dist/*.xpi dist/*.zip)
          if [ "${#files[@]}" -eq 0 ]; then
            echo "no build artifact found in dist/" >&2
            exit 1
          fi
          mv "${files[0]}" dist/wasavi.xpi

      - name: Upload XPI artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: wasavi-xpi
          path: dist/wasavi.xpi
          retention-days: 90

  commit-dist:
    # Commit the freshly built dist/wasavi.xpi back to master.
    # Loop prevention is defense-in-depth:
    #   1. Pushes made with GITHUB_TOKEN do not re-trigger workflows (GitHub spec).
    #   2. The commit message carries [skip ci] as a fallback.
    #   3. The actor guard below skips runs triggered by github-actions[bot].
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/master' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    concurrency:
      group: commit-dist-${{ github.ref }}

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          ref: master

      - name: Download XPI artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: wasavi-xpi
          path: dist

      - name: Commit and push dist/wasavi.xpi
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          # keep the built artifact outside the worktree; each attempt
          # re-places it on top of the latest master, so a concurrent
          # push never causes a (binary) rebase conflict
          cp dist/wasavi.xpi "${RUNNER_TEMP}/wasavi.xpi"
          for i in 1 2 3; do
            git fetch origin master || true
            git reset --hard origin/master
            cp "${RUNNER_TEMP}/wasavi.xpi" dist/wasavi.xpi
            git add dist/wasavi.xpi
            if git diff --cached --quiet; then
              echo "dist/wasavi.xpi unchanged; nothing to commit"
              exit 0
            fi
            git commit -m 'ci: update dist/wasavi.xpi [skip ci]'
            if git push origin HEAD:master; then
              exit 0
            fi
            sleep "$i"
          done
          echo "failed to push dist/wasavi.xpi after 3 attempts" >&2
          exit 1

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Determine version
        id: version
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Download XPI artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: wasavi-xpi
          path: dist

      - name: Create GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2.6.2
        with:
          name: wasavi ${{ steps.version.outputs.version }}
          files: dist/wasavi.xpi
          generate_release_notes: true
